bundle:
  name: caltrans-pde-app

workspace:
  root_path: /Workspace/Shared/apps/${bundle.name}/${bundle.target}

sync:
  paths:
    - .
  exclude:
    - scripts/
    - README.md
    - .gitignore
    - databricks.yml

resources:
  apps:
    caltrans_pde_app:
      name: caltrans-pde-app
      description: Caltrans full AI application deployed on Databricks Apps.
      source_code_path: .

targets:
  default:
    default: true
